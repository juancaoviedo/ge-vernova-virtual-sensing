# Bind to 0.0.0.0 INSIDE the container so Docker's port-forward can reach it.
# Host exposure is restricted to localhost by the compose mapping
# "127.0.0.1:1883:1883" (same localhost-only model as influxdb/grafana, T-10-01).
# (A 127.0.0.1 bind here listens only on the container loopback, which the
# docker-proxy forward — routed via the container bridge IP — cannot reach,
# so host-side paho clients in publish.py/estimate.py fail to connect.)
listener 1883 0.0.0.0
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest stdout
